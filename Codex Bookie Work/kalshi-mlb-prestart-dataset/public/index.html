<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Polymarket MLB Prestart Moneyline</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="lane">MLB</p>
          <h1>Moneyline</h1>
          <p id="marketSubtitle">Game Start Snapshot</p>
        </div>
        <button id="getData" class="get-data">Get Data</button>
      </section>

      <section class="summary">
        <div>
          <span>Settled Games</span>
          <strong id="settledRows">--</strong>
        </div>
        <div>
          <span>Last pull date</span>
          <strong id="latestPull">--</strong>
          <small id="pullUpdated">updated: --</small>
        </div>
      </section>

      <section class="reporting">
        <div class="section-head">
          <h2>Reporting</h2>
          <div class="report-actions">
            <span id="rowCount">--</span>
            <a class="export" href="/api/export.csv">Generate CSV</a>
          </div>
        </div>
        <div id="bucketRows" class="bucket-list"></div>
      </section>

      <section class="reporting secondary">
        <div class="section-head">
          <h2>Analysis</h2>
        </div>
        <div id="analysisRows" class="analysis-grid"></div>
      </section>

      <section class="reporting secondary">
        <div class="section-head">
          <h2>Paired Bucket Audit</h2>
          <span id="pairAuditCount">--</span>
        </div>
        <div id="pairAuditRows" class="pair-audit-list"></div>
      </section>

      <section class="reporting secondary">
        <div class="section-head">
          <h2>Data Pulls</h2>
        </div>
        <pre id="updateLog">No data pulls yet.</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
